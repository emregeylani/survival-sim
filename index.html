<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>survival-sim</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

    <div id="extinction-alert"></div>

    <!-- Top Stats Bar -->
    <div id="stats-bar">
        <div class="stat-group">
            <span class="stat-label">TICK</span>
            <span id="stat-tick" class="stat-value">0</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-group">
            <span class="stat-label plant-color">FLORA</span>
            <span id="stat-plants" class="stat-value plant-color">0</span>
        </div>
        <div class="stat-group">
            <span class="stat-label herb-color">HERB</span>
            <span id="stat-herbivores" class="stat-value herb-color">0</span>
        </div>
        <div class="stat-group">
            <span class="stat-label carn-color">CARN</span>
            <span id="stat-carnivores" class="stat-value carn-color">0</span>
        </div>
        <div class="stat-group">
            <span class="stat-label insect-color">INSCT</span>
            <span id="stat-insects" class="stat-value insect-color">0</span>
        </div>
        <div class="stat-group">
            <span class="stat-label" style="color:#c878ff">SCAV</span>
            <span id="stat-scavengers" class="stat-value" style="color:#c878ff">0</span>
        </div>
        <div class="stat-group">
            <span class="stat-label" style="color:#40d4aa">BIRD</span>
            <span id="stat-birds" class="stat-value" style="color:#40d4aa">0</span>
        </div>
        <div class="stat-group">
            <span class="stat-label" style="color:#38b8ff">FISH</span>
            <span id="stat-fish" class="stat-value" style="color:#38b8ff">0</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-group">
            <span class="stat-label">MAX GEN</span>
            <span id="stat-maxgen" class="stat-value accent">0</span>
        </div>
        <div class="stat-group">
            <span class="stat-label">EXTINCT</span>
            <span id="stat-extinct" class="stat-value warn">0</span>
        </div>
        <div class="stat-divider"></div>
        <div id="event-indicator"></div>
        <div class="stat-divider"></div>
        <div class="stat-group">
            <span id="stat-season" class="stat-value" style="color:#68d468;font-size:11px">🌱 SPRING</span>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content">

        <div id="canvas-container">
            <canvas id="sim-canvas"></canvas>
            <div id="canvas-overlay-msg"></div>
            <div id="zoom-indicator">1.0×</div>
        </div>

        <!-- Right Panel -->
        <div id="right-panel">
            <div id="panel-tabs">
                <button class="tab-btn active" data-tab="entity">ENTITY</button>
                <button class="tab-btn" data-tab="analytics">CHART</button>
                <button class="tab-btn" data-tab="params">PARAMS</button>
            </div>

            <div id="tab-entity" class="tab-content active">
                <div id="entity-panel">
                    <div class="no-selection">
                        <div class="no-sel-icon">◎</div>
                        <div>click an entity<br>to inspect</div>
                    </div>
                </div>
            </div>

            <div id="tab-analytics" class="tab-content">
                <div id="chart-wrapper">
                    <canvas id="population-chart"></canvas>
                </div>
                <div class="panel-section-title" style="margin:8px 0 4px">EVOLUTION</div>
                <div id="evolution-wrapper">
                    <canvas id="evolution-chart"></canvas>
                </div>
                <div id="hall-of-fame">
                    <div class="panel-section-title">HALL OF FAME</div>
                    <div id="hof-content"></div>
                </div>
            </div>

            <div id="tab-params" class="tab-content">
                <div id="params-panel">
                    <div class="panel-section-title">SIMULATION</div>
                    <div class="param-row">
                        <label>Mutation Rate</label>
                        <input type="range" id="p-mutation" min="0" max="0.5" step="0.01" value="0.15">
                        <span class="param-val" id="p-mutation-val">0.15</span>
                    </div>
                    <div class="param-row">
                        <label>Plant Spread</label>
                        <input type="range" id="p-spread" min="0.01" max="1" step="0.01" value="0.3">
                        <span class="param-val" id="p-spread-val">0.30</span>
                    </div>
                    <div class="param-row">
                        <label>Max Herbivores</label>
                        <input type="range" id="p-maxherb" min="50" max="600" step="10" value="300">
                        <span class="param-val" id="p-maxherb-val">300</span>
                    </div>
                    <div class="param-row">
                        <label>Max Carnivores</label>
                        <input type="range" id="p-maxcarn" min="10" max="200" step="5" value="100">
                        <span class="param-val" id="p-maxcarn-val">100</span>
                    </div>
                    <div class="param-row">
                        <label>Max Plants</label>
                        <input type="range" id="p-maxplant" min="100" max="1000" step="20" value="500">
                        <span class="param-val" id="p-maxplant-val">500</span>
                    </div>
                    <div class="param-row">
                        <label>Max Scavengers</label>
                        <input type="range" id="p-maxscav" min="10" max="150" step="5" value="80">
                        <span class="param-val" id="p-maxscav-val">80</span>
                    </div>
                    <div class="param-row">
                        <label>Max Birds</label>
                        <input type="range" id="p-maxbird" min="10" max="200" step="5" value="100">
                        <span class="param-val" id="p-maxbird-val">100</span>
                    </div>
                    <div class="param-row">
                        <label>Mating Range</label>
                        <input type="range" id="p-matingrange" min="30" max="400" step="10" value="180">
                        <span class="param-val" id="p-matingrange-val">180</span>
                    </div>

                    <div class="panel-section-title" style="margin-top:16px">WORLD</div>
                    <div class="param-row">
                        <label>World Seed</label>
                        <input type="number" id="p-seed" value="42" style="width:70px">
                    </div>
                    <button id="btn-restart" class="action-btn">↺ RESTART</button>
                </div>
            </div>

            <!-- Persistent extinction log — always visible at bottom of right panel -->
            <div id="extinction-log-persistent">
                <div class="ext-log-title">EXTINCTION LOG</div>
                <div id="ext-content"><span class="dim">no extinctions yet</span></div>
            </div>

        </div><!-- end right-panel -->

    </div>

    <!-- Bottom Controls -->
    <div id="controls-bar">
        <div id="time-controls">
            <button id="btn-play-pause" class="ctrl-btn active">⏸ PAUSE</button>
            <div class="speed-group">
                <button class="speed-btn active" data-speed="0.1">1</button>
                <button class="speed-btn" data-speed="0.25">2</button>
                <button class="speed-btn" data-speed="0.5">3</button>
                <button class="speed-btn" data-speed="1">4</button>
                <button class="speed-btn" data-speed="2">5</button>
            </div>
        </div>
        <div class="ctrl-divider"></div>
        <div id="event-controls">
            <span class="ctrl-label">TRIGGER EVENT</span>
            <button class="event-btn" data-event="meteor">☄ METEOR</button>
            <button class="event-btn" data-event="volcano">🌋 VOLCANO</button>
            <button class="event-btn" data-event="iceage">❄ ICE AGE</button>
            <button class="event-btn" data-event="drought">☀ DROUGHT</button>
        </div>
    </div>

</div>

<!-- Load order: base classes first, then entities, then UI, then loop -->
<script src="engine/genetics.js"></script>
<script src="engine/world.js"></script>
<script src="entities/Living.js"></script>
<script src="entities/Plant.js"></script>
<script src="entities/Insect.js"></script>
<script src="entities/Carcass.js"></script>
<script src="entities/Animal.js"></script>
<script src="entities/Scavenger.js"></script>
<script src="entities/Bird.js"></script>
<script src="entities/Fish.js"></script>
<script src="events/disasters.js"></script>
<script src="ui/panel.js"></script>
<script src="ui/controls.js"></script>
<script src="ui/analytics.js"></script>
<script src="engine/loop.js"></script>

<script>
function startSim() {
    const canvas    = document.getElementById('sim-canvas');
    const container = document.getElementById('canvas-container');

    const W = container.offsetWidth  || (window.innerWidth  - 290);
    const H = container.offsetHeight || (window.innerHeight - 40 - 48);
    canvas.width  = W;
    canvas.height = H;

    console.log(`[survival-sim] canvas: ${W} x ${H}`);

    window.SIM_PARAMS = {
        mutationRate:  0.15,
        plantSpread:   0.30,
        maxHerbivores: 300,
        maxCarnivores: 100,
        maxPlants:     500,
        maxScavengers: 80,
        maxBirds:      100,
        maxFish:       120,
        maxMatingRange: 180,
        simSpeed:       0.1,
        seed: Math.floor(Math.random() * 99999),
    };

    // Show the random seed in the input
    document.getElementById('p-seed').value = SIM_PARAMS.seed;

    // ── Camera (zoom + pan) ───────────────────────────────────────────────
    window.camera = { scale: 1, tx: 0, ty: 0, minScale: 0.25, maxScale: 12 };

    const zoomEl  = document.getElementById('zoom-indicator');
    const updateZoomUI = () => {
        zoomEl.textContent = camera.scale.toFixed(2) + '×';
        zoomEl.classList.toggle('zoomed', camera.scale !== 1);
    };

    // Zoom with scroll wheel — zoom around cursor
    canvas.addEventListener('wheel', e => {
        e.preventDefault();
        const rect   = canvas.getBoundingClientRect();
        const sx     = e.clientX - rect.left;
        const sy     = e.clientY - rect.top;
        const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
        const newScale = Math.max(camera.minScale, Math.min(camera.maxScale, camera.scale * factor));
        camera.tx    = sx - (sx - camera.tx) * (newScale / camera.scale);
        camera.ty    = sy - (sy - camera.ty) * (newScale / camera.scale);
        camera.scale = newScale;
        updateZoomUI();
    }, { passive: false });

    // Pan with left-drag (suppress click if dragged more than 6px)
    let _panActive = false, _panSX = 0, _panSY = 0, _panTX = 0, _panTY = 0, _panMoved = false;

    canvas.addEventListener('mousedown', e => {
        if (e.button !== 0) return;
        _panActive = true;
        _panMoved  = false;
        _panSX     = e.clientX;
        _panSY     = e.clientY;
        _panTX     = camera.tx;
        _panTY     = camera.ty;
        canvas.style.cursor = 'grab';
    });

    window.addEventListener('mousemove', e => {
        if (!_panActive) return;
        const dx = e.clientX - _panSX;
        const dy = e.clientY - _panSY;
        if (!_panMoved && Math.hypot(dx, dy) > 6) _panMoved = true;
        if (_panMoved) {
            camera.tx = _panTX + dx;
            camera.ty = _panTY + dy;
            canvas.style.cursor = 'grabbing';
        }
    });

    window.addEventListener('mouseup', e => {
        if (e.button !== 0) return;
        canvas.style.cursor = '';
        // If it was a real drag, suppress the UI click that fires next
        if (_panMoved) e._suppressSimClick = true;
        _panActive = false;
    });

    // Double-click to reset zoom
    canvas.addEventListener('dblclick', e => {
        camera.scale = 1; camera.tx = 0; camera.ty = 0;
        updateZoomUI();
        e.stopImmediatePropagation(); // don't also select entity
    });

    // Patch UI click handler to ignore pan-end events
    const _origClick = canvas.onclick;
    canvas.addEventListener('click', e => { if (e._suppressSimClick) e.stopImmediatePropagation(); }, true);

    // Spacebar always toggles pause
    window.addEventListener('keydown', e => {
        if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
            e.preventDefault();
            const playBtn = document.getElementById('btn-play-pause');
            window.sim.paused = !window.sim.paused;
            playBtn.textContent = window.sim.paused ? '▶ PLAY' : '⏸ PAUSE';
            playBtn.classList.toggle('paused', window.sim.paused);
        }
    });

    try {
        window.world = new World(canvas, SIM_PARAMS.seed);
        console.log(`[survival-sim] world generated: ${world.cols}×${world.rows} tiles`);

        window.sim = new SimulationLoop(world);
        console.log(`[survival-sim] entities spawned: ${sim.entities.length}`);

        UI.init(canvas, sim);
        Controls.init(sim);
        Analytics.init();
        Params.init(sim, world);

        sim.start();
        console.log('[survival-sim] loop started ✓');
    } catch(err) {
        console.error('[survival-sim] INIT ERROR:', err);
        document.getElementById('canvas-overlay-msg').textContent = 'INIT ERROR — open F12 console';
        document.getElementById('canvas-overlay-msg').classList.add('show');
    }
}

window.addEventListener('load', () => setTimeout(startSim, 50));
</script>
</body>
</html>
